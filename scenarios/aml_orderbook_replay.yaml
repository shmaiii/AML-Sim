name: aml_orderbook_replay
description: >
  First AML wrapper orderbook smoke test. This keeps StockSim unchanged and
  runs AAPL with the minimum synthetic AML market roles.
rabbitmq_host: localhost

stocksim_config:
  exchange_mode: orderbook

  instruments:
    - AAPL

  exchanges:
    AAPL:
      data_source: synthetic
      symbol_type: stock
      candle_interval: 1d
      warmup_candles: 0

  agents:
    market_maker:
      type: AML_Market_Maker
      count: 1
      parameters:
        initial_cash: 1000000
        action_interval: 30s
        slow_loop_interval: 5m
        fair_price: 100.0
        spread: 0.2
        min_spread: 0.05
        max_spread: 1.5
        quote_size: 100
        quote_levels: 5
        level_spacing: 0.05
        size_decay: 0.85
        target_inventory: 10000
        inventory_skew: 0.001
        volatility_sensitivity: 5.0
        shock_spread_multiplier: 1.2
        shock_price_adjustment: 0.4
        liquidity_withdrawal_sensitivity: 0.35
        profile:
          name: baseline_market_maker
          risk_tolerance: medium
          decision_style: inventory_aware_quoting
          inventory_discipline: 0.7
          quote_aggressiveness: 0.5
          behavioral_traits:
            adverse_selection_sensitivity: 0.6
          preferences:
            quoting_style: balanced
        initial_positions:
          AAPL: 10000
        initial_cost_basis:
          AAPL: 100.0

    retail_population:
      type: AML_Retail_Trader
      count: 1
      parameters:
        initial_cash: 25000
        action_interval: 1m
        slow_loop_interval: 5m
        trade_probability: 0.45
        max_order_size: 10
        buy_bias: 0.5
        herding_tendency: 0.35
        panic_level: 0.45
        sentiment_sensitivity: 0.55
        shock_sensitivity: 0.5
        profile:
          name: baseline_retail
          risk_tolerance: medium
          decision_style: noisy_sentiment_driven
          social_sensitivity: 0.5
          panic_sensitivity: 0.4
          herding_tendency: 0.4
          behavioral_traits:
            overreaction: 0.3
          preferences:
            order_style: market
        initial_positions:
          AAPL: 0
        initial_cost_basis:
          AAPL: 100.0

    institutional_trader:
      type: AML_Institutional_Trader
      count: 1
      parameters:
        initial_cash: 500000
        action_interval: 2m
        slow_loop_interval: 10m
        target_positions:
          AAPL: 500
        child_order_size: 50
        order_type: MARKET
        alpha_strategy: target_execution
        alpha_strategies:
          - target_execution
          - momentum
          - mean_reversion
        strategy_weights:
          momentum: 0.5
          mean_reversion: 0.5
        max_position: 500
        min_position: 0
        profile:
          name: baseline_institution
          risk_tolerance: medium
          decision_style: target_execution
          execution_patience: 0.6
          benchmark_focus: arrival_price
          information_sensitivity: 0.5
          behavioral_traits:
            urgency_discipline: 0.6
          preferences:
            execution_style: sliced
        initial_positions:
          AAPL: 0
        initial_cost_basis:
          AAPL: 100.0

    shock_agent:
      type: AML_Shock_Agent
      count: 1
      parameters:
        default_duration_ticks: 12
        scheduled_events:
          - id: negative_news_1
            tick: 8
            shock_type: negative_news
            severity: 0.65
            direction: -1
            affected_instruments:
              - AAPL
            duration_ticks: 12
            message: Synthetic negative news shock for AML behavior study.

  simulation:
    start_time: "2025-03-01T09:30:00+00:00"
    end_time: "2025-03-01T10:00:00+00:00"
    tick_interval: 30s
    expected_exchange_agent_count: 1

  environment:
    rabbitmq_host: localhost
    log_level: INFO
