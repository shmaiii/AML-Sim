name: aml_orderbook_replay
description: >
  First AML wrapper orderbook smoke test. This keeps StockSim unchanged and
  runs AAPL with a random baseline trader plus a buy-and-hold baseline trader.
rabbitmq_host: localhost

stocksim_config:
  exchange_mode: orderbook

  instruments:
    - AAPL

  exchanges:
    AAPL:
      data_source: polygon
      symbol_type: stock
      candle_interval: 1d
      warmup_candles: 0

  agents:
    random_baseline:
      type: Random_Trader
      count: 1
      parameters:
        initial_cash: 100000
        action_interval: 5m
        trade_probability: 0.2
        position_size_pct: 0.05
        initial_positions:
          AAPL: 0
        initial_cost_basis:
          AAPL: 100.0

    buy_hold_baseline:
      type: Buy_And_Hold_Trader
      count: 1
      parameters:
        initial_cash: 100000
        action_interval: 1m
        quantity_size: 100
        initial_positions:
          AAPL: 0
        initial_cost_basis:
          AAPL: 100.0

  simulation:
    start_time: "2025-03-01T09:30:00Z"
    end_time: "2025-03-01T10:00:00Z"
    tick_interval: 5m
    expected_exchange_agent_count: 1

  environment:
    rabbitmq_host: localhost
    log_level: INFO
