name: aml_one_hour_live
description: >
  One-hour synthetic AML live demo with several market makers, active retail
  flow, institutional execution with internal target/momentum/mean-reversion
  strategy modes, an informed trader, a liquidity taker, and scheduled shocks
  that affect fundamentals, order arrivals, risk limits, and displayed
  liquidity.
rabbitmq_host: localhost

stocksim_config:
  exchange_mode: orderbook

  instruments:
    - AAPL

  exchanges:
    AAPL:
      data_source: synthetic
      symbol_type: stock
      candle_interval: 1d
      warmup_candles: 0

  agents:
    market_maker:
      type: AML_Market_Maker
      count: 3
      parameters:
        initial_cash: 600000
        action_interval: 30s
        slow_loop_interval: 5m
        fair_price: 100.0
        spread: 0.2
        min_spread: 0.05
        max_spread: 1.5
        quote_size: 90
        quote_levels: 6
        level_spacing: 0.04
        size_decay: 0.85
        target_inventory: 5000
        inventory_skew: 0.001
        max_inventory: 8000
        min_inventory: 500
        volatility_sensitivity: 5.0
        shock_spread_multiplier: 1.25
        shock_price_adjustment: 0.45
        liquidity_withdrawal_sensitivity: 0.35
        initial_positions:
          AAPL: 5000
        initial_cost_basis:
          AAPL: 100.0

    retail_population:
      type: AML_Retail_Trader
      count: 5
      parameters:
        initial_cash: 30000
        action_interval: 30s
        slow_loop_interval: 5m
        trade_probability: 0.42
        max_order_size: 12
        buy_bias: 0.55
        herding_tendency: 0.45
        panic_level: 0.55
        sentiment_sensitivity: 0.65
        shock_sensitivity: 0.7
        initial_positions:
          AAPL: 10
        initial_cost_basis:
          AAPL: 100.0

    institutional_execution:
      type: AML_Institutional_Trader
      count: 1
      parameters:
        initial_cash: 750000
        action_interval: 1m
        slow_loop_interval: 10m
        target_positions:
          AAPL: 1800
        child_order_size: 75
        order_type: MARKET
        alpha_strategy: target_execution
        alpha_strategies:
          - target_execution
          - momentum
          - mean_reversion
        strategy_weights:
          momentum: 0.45
          mean_reversion: 0.55
        max_position: 1800
        min_position: 0
        shock_reactivity: 0.7
        initial_positions:
          AAPL: 0
        initial_cost_basis:
          AAPL: 100.0

    informed_trader:
      type: AML_Informed_Trader
      count: 1
      parameters:
        initial_cash: 250000
        action_interval: 30s
        slow_loop_interval: 10m
        fair_value_anchor: 100.0
        information_edge: 0.72
        trade_probability: 0.45
        max_order_size: 45
        max_position: 700
        min_position: 0
        signal_threshold: 0.0015
        momentum_weight: 0.2
        fundamental_sensitivity: 1.0
        shock_reactivity: 1.0
        order_type: MARKET
        initial_positions:
          AAPL: 150
        initial_cost_basis:
          AAPL: 100.0

    liquidity_taker:
      type: AML_Liquidity_Taker
      count: 1
      parameters:
        initial_cash: 150000
        action_interval: 30s
        slow_loop_interval: 10m
        flow_intensity: 0.36
        buy_bias: 0.52
        max_order_size: 35
        inventory_limit: 500
        shock_sensitivity: 0.85
        aggression: 0.8
        initial_positions:
          AAPL: 80
        initial_cost_basis:
          AAPL: 100.0

    shock_agent:
      type: AML_Shock_Agent
      count: 1
      parameters:
        default_duration_ticks: 12
        random_seed: 20250301
        initial_market_state:
          policy_rate_bps: 425
          liquidity_index: 1.0
          risk_aversion: 0.0
          credit_spread_bps: 90
        random_events:
          enabled: true
          probability_per_tick: 0.025
          max_events: 2
          start_tick: 10
          end_tick: 105
          templates:
            - shock_type: unexpected_order_flow
              shock_class: non_systematic
              scope: micro
              weight: 2.0
              severity_range: [0.25, 0.55]
              direction_choices: [-1, 1]
              effects:
                order_arrival_multiplier: 1.65
                risk_limit_multiplier: 0.82
                liquidity_multiplier: 0.72
                volatility_multiplier: 1.35
                spread_multiplier: 1.2
              affected_instruments:
                - AAPL
              duration_ticks: 8
              message: Unexpected burst of aggressive order flow.
            - shock_type: funding_stress
              shock_class: systematic
              scope: market_structure
              weight: 1.0
              severity_range: [0.35, 0.65]
              direction: -1
              effects:
                order_arrival_multiplier: 1.35
                risk_limit_multiplier: 0.68
                liquidity_multiplier: 0.55
                volatility_multiplier: 1.5
                spread_multiplier: 1.45
                funding_spread_bps: 18
                risk_aversion_shift: 0.35
              affected_asset_classes:
                - stock
              duration_ticks: 10
              message: Unexpected funding stress reduces risk appetite and displayed liquidity.
        scheduled_events:
          - id: live_opening_negative_news
            tick: 20
            notice_ticks: 4
            shock_type: negative_news
            shock_class: non_systematic
            scope: micro
            trigger_type: scheduled
            visibility: public
            severity: 0.55
            direction: -1
            surprise: 0.35
            expected_probability: 0.75
            effects:
              fundamental_price_shift: -0.9
              order_arrival_multiplier: 1.55
              risk_limit_multiplier: 0.72
              liquidity_multiplier: 0.65
              volatility_multiplier: 1.45
              spread_multiplier: 1.25
            affected_instruments:
              - AAPL
            duration_ticks: 12
            message: Early-session negative news shock.
          - id: live_liquidity_stress
            tick: 60
            shock_type: liquidity_stress
            shock_class: systematic
            scope: market_structure
            trigger_type: unexpected
            visibility: public
            severity: 0.7
            direction: -1
            surprise: 0.9
            effects:
              fundamental_price_shift: -0.65
              order_arrival_multiplier: 1.9
              risk_limit_multiplier: 0.55
              liquidity_multiplier: 0.4
              volatility_multiplier: 1.8
              spread_multiplier: 1.7
              risk_aversion_shift: 0.4
            market_state_delta:
              risk_aversion: 0.4
            affected_instruments:
              - AAPL
            duration_ticks: 16
            message: Mid-session liquidity stress event.
          - id: live_recovery_news
            tick: 95
            notice_ticks: 3
            shock_type: positive_recovery_news
            shock_class: non_systematic
            scope: micro
            trigger_type: scheduled
            visibility: public
            severity: 0.45
            direction: 1
            surprise: 0.3
            expected_probability: 0.65
            effects:
              fundamental_price_shift: 0.8
              order_arrival_multiplier: 1.35
              risk_limit_multiplier: 1.1
              liquidity_multiplier: 0.85
              volatility_multiplier: 1.25
              spread_multiplier: 1.1
              sentiment_shift: 0.35
            affected_instruments:
              - AAPL
            duration_ticks: 10
            message: Late-session positive recovery shock.

  simulation:
    start_time: "2025-03-01T09:30:00+00:00"
    end_time: "2025-03-01T10:30:00+00:00"
    tick_interval: 30s
    max_wall_time_seconds: 900
    expected_exchange_agent_count: 1

  environment:
    rabbitmq_host: localhost
    log_level: INFO
